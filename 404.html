<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Luis Paiva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    :root { --ink: #0f0f0d; --paper: #f7f5f0; --accent: #c8502a; --muted: #7a7a72; --serif: 'DM Serif Display',Georgia,serif; --sans: 'DM Sans',system-ui,sans-serif; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .code { font-family: var(--serif); font-size: clamp(5rem,20vw,10rem); line-height: 1; color: var(--accent); opacity: .15; }
    h1 { font-family: var(--serif); font-size: clamp(1.5rem,4vw,2.2rem); margin: 1rem 0 .75rem; letter-spacing: -.02em; }
    p { color: var(--muted); font-size: .95rem; max-width: 38ch; margin: 0 auto 2rem; }
    a.btn { display: inline-block; background: var(--ink); color: var(--paper); text-decoration: none; padding: .7rem 1.6rem; font-size: .8rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; transition: background .15s; }
    a.btn:hover { background: var(--accent); }
    .links { margin-top: 2rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    .links a { font-size: .8rem; color: var(--muted); text-decoration: none; letter-spacing: .04em; text-transform: uppercase; }
    .links a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>This page doesn't exist</h1>
  <p>The article or page you're looking for has moved, or never existed in the first place.</p>
  <a class="btn" href="/">Back to home</a>
  <div class="links">
    <a href="/about">About</a>
    <a href="/newsletter">Newsletter</a>
    <a href="/privacy">Privacy</a>
  </div>
</body>
</html>
