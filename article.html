<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading... — Luis Paiva</title>
  <meta name="description" content="" />
  <link rel="canonical" href="" id="canonical" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0f0f0d; --ink-soft: #3a3a35; --ink-muted: #7a7a72;
      --paper: #f7f5f0; --cream: #eeebe3; --rule: #d8d4c8;
      --accent: #c8502a; --accent-2: #2a5c4e;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --max: 740px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); font-size: 17px; line-height: 1.7; -webkit-font-smoothing: antialiased; }

    /* MASTHEAD */
    .masthead { border-bottom: 3px solid var(--ink); padding: 0 1.5rem; }
    .masthead-inner { max-width: 1140px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 0; }
    .masthead-logo a { font-family: var(--serif); font-size: 1.5rem; color: var(--ink); text-decoration: none; letter-spacing: -.02em; }
    .masthead-logo .dot { color: var(--accent); }
    .masthead-nav a { font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; color: var(--ink); text-decoration: none; margin-left: 1.5rem; transition: color .15s; }
    .masthead-nav a:hover { color: var(--accent); }

    /* ARTICLE LAYOUT */
    .article-wrap { max-width: var(--max); margin: 0 auto; padding: 3rem 1.5rem 5rem; }

    /* LOADING */
    .loading { text-align: center; padding: 4rem; color: var(--ink-muted); font-size: .95rem; }
    .loading::after { content: ''; display: block; width: 32px; height: 32px; border: 2px solid var(--rule); border-top-color: var(--accent); border-radius: 50%; margin: 1rem auto 0; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ARTICLE CONTENT */
    #article-content { animation: fadeIn .4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .article-label { font-size: .68rem; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 1rem; }

    #article-content h1 {
      font-family: var(--serif);
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      line-height: 1.1;
      letter-spacing: -.02em;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    #article-content h2 {
      font-family: var(--serif);
      font-size: 1.5rem;
      line-height: 1.2;
      letter-spacing: -.01em;
      color: var(--ink);
      margin: 2.5rem 0 .75rem;
      padding-top: .5rem;
      border-top: 1px solid var(--rule);
    }

    #article-content h3 {
      font-family: var(--serif);
      font-size: 1.15rem;
      color: var(--ink);
      margin: 1.75rem 0 .5rem;
    }

    #article-content p {
      color: var(--ink-soft);
      margin-bottom: 1.1rem;
    }

    #article-content p:first-of-type {
      font-size: 1.05rem;
      color: var(--ink);
    }

    #article-content a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
      transition: color .15s;
    }
    #article-content a:hover { color: #a83e1e; }

    #article-content ul, #article-content ol {
      padding-left: 1.5rem;
      margin-bottom: 1.1rem;
      color: var(--ink-soft);
    }
    #article-content li { margin-bottom: .4rem; }

    #article-content strong { color: var(--ink); font-weight: 500; }
    #article-content em { font-style: italic; }

    /* COMPARISON TABLE */
    .table-wrap { overflow-x: auto; margin: 2rem 0; border: 1px solid var(--rule); }
    #article-content table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    #article-content th {
      background: var(--ink); color: var(--paper);
      text-align: left; padding: .65rem 1rem;
      font-weight: 500; font-size: .78rem;
      letter-spacing: .04em; text-transform: uppercase;
    }
    #article-content td { padding: .65rem 1rem; border-bottom: 1px solid var(--rule); color: var(--ink-soft); }
    #article-content tr:last-child td { border-bottom: none; }
    #article-content tr:nth-child(even) td { background: var(--cream); }

    /* BLOCKQUOTE / CALLOUT */
    #article-content blockquote {
      border-left: 3px solid var(--accent);
      padding: .75rem 1.25rem;
      margin: 1.5rem 0;
      background: var(--cream);
      color: var(--ink-soft);
      font-style: italic;
    }

    /* DISCLAIMER */
    .disclaimer {
      margin-top: 3rem;
      padding: 1.25rem;
      background: var(--cream);
      border-top: 2px solid var(--rule);
      font-size: .82rem;
      color: var(--ink-muted);
      font-style: italic;
    }

    /* NEWSLETTER CTA */
    .article-cta {
      background: var(--ink);
      color: var(--paper);
      padding: 2rem;
      margin-top: 3rem;
    }
    .article-cta h3 { font-family: var(--serif); font-size: 1.3rem; margin-bottom: .4rem; }
    .article-cta p { color: rgba(247,245,240,.65); font-size: .9rem; margin-bottom: 1rem; }
    .article-cta-form { display: flex; gap: .5rem; }
    .article-cta-form input {
      flex: 1; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: var(--paper); font-family: var(--sans); font-size: .9rem; padding: .65rem .9rem; outline: none;
    }
    .article-cta-form input::placeholder { color: rgba(247,245,240,.35); }
    .article-cta-form button {
      background: var(--accent); color: var(--paper); border: none;
      font-family: var(--sans); font-size: .75rem; font-weight: 500;
      letter-spacing: .06em; text-transform: uppercase;
      padding: .65rem 1.25rem; cursor: pointer; white-space: nowrap;
    }
    .article-cta-form button:hover { background: #a83e1e; }

    /* FOOTER */
    footer { border-top: 3px solid var(--ink); padding: 2rem 1.5rem; margin-top: 4rem; }
    .footer-inner { max-width: 1140px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .footer-logo { font-family: var(--serif); font-size: 1rem; }
    .footer-links a { font-size: .75rem; color: var(--ink-muted); text-decoration: none; margin-left: 1.25rem; }
    .footer-links a:hover { color: var(--accent); }
    .footer-legal { font-size: .7rem; color: var(--ink-muted); width: 100%; margin-top: .5rem; }

    @media (max-width: 600px) {
      .article-cta-form { flex-direction: column; }
      .masthead-nav a:first-child { margin-left: 0; }
    }
  </style>
</head>
<body>

  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-logo"><a href="/">Luis Paiva<span class="dot">.</span></a></div>
      <nav class="masthead-nav">
        <a href="/start-here">Start Here</a>
        <a href="/calculators">Calculators</a>
        <a href="/articles">Articles</a>
        <a href="/about">About</a>
        <a href="/newsletter">Newsletter</a>
      </nav>
    </div>
  </header>

  <main class="article-wrap">
    <div id="article-content">
      <div class="loading">Loading article...</div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo">Luis Paiva<span style="color:var(--accent)">.</span></div>
      <nav class="footer-links">
        <a href="/about">About</a>
        <a href="/privacy">Privacy</a>
        <a href="/newsletter">Newsletter</a>
      </nav>
      <p class="footer-legal">This site contains affiliate links. We may earn a commission at no extra cost to you. Always do your own research. &copy; <span id="yr"></span> Luis Paiva.</p>
    </div>
  </footer>

  <!-- Minimal markdown parser + article loader -->
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // Get slug from URL path
    // e.g. /how-to-save-10000-pounds-in-one-year-uk/ -> how-to-save-10000-pounds-in-one-year-uk
    const slug = location.pathname.replace(/^\/|\/$/g, '');

    if (!slug || slug === 'article') {
      window.location.href = '/';
    }

    // ── Minimal markdown -> HTML converter ──────────────────────────────────
    function mdToHtml(md) {
      let html = md;

      // Tables
      html = html.replace(/(\|.+\|\n)+/g, match => {
        const rows = match.trim().split('\n');
        const headers = rows[0].split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const body = rows.slice(2).map(row => {
          const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        return `<div class="table-wrap"><table><thead><tr>${headers}</tr></thead><tbody>${body}</tbody></table></div>`;
      });

      // Headings
      html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // Bold and italic
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" rel="noopener">$1</a>');

      // Blockquotes
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

      // Unordered lists
      html = html.replace(/(^- .+$\n?)+/gm, match => {
        const items = match.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
        return `<ul>${items}</ul>`;
      });

      // Ordered lists
      html = html.replace(/(^\d+\. .+$\n?)+/gm, match => {
        const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
        return `<ol>${items}</ol>`;
      });

      // Horizontal rules
      html = html.replace(/^---+$/gm, '<hr>');

      // Paragraphs — wrap blocks not already wrapped in tags
      html = html.split(/\n{2,}/).map(block => {
        block = block.trim();
        if (!block) return '';
        if (/^<(h[1-6]|ul|ol|li|table|div|blockquote|hr)/.test(block)) return block;
        return `<p>${block}</p>`;
      }).join('\n');

      // Clean up stray newlines inside tags
      html = html.replace(/<p>\s*<\/p>/g, '');

      return html;
    }

    // ── Detect and extract disclaimer ────────────────────────────────────────
    function extractDisclaimer(html) {
      const match = html.match(/<p>(<em>Affiliate disclosure.*?<\/em>)<\/p>/i);
      if (!match) return { html, disclaimer: '' };
      return {
        html: html.replace(match[0], ''),
        disclaimer: match[1]
      };
    }

    // ── Get category from slug ───────────────────────────────────────────────
    function categoryFromSlug(s) {
      if (s.includes('saving') || s.includes('premium-bond')) return 'Savings';
      if (s.includes('invest') || s.includes('etf') || s.includes('index-fund')) return 'Investing';
      if (s.includes('isa')) return 'ISAs';
      if (s.includes('credit-card') || s.includes('credit-score')) return 'Credit';
      if (s.includes('mortgage') || s.includes('stamp-duty')) return 'Mortgages';
      if (s.includes('budget') || s.includes('spend') || s.includes('bill')) return 'Budgeting';
      if (s.includes('pension') || s.includes('retirement')) return 'Pensions';
      if (s.includes('tax') || s.includes('self-assessment')) return 'Tax';
      if (s.includes('side-hustle') || s.includes('passive-income') || s.includes('salary')) return 'Side Income';
      if (s.includes('debt') || s.includes('loan')) return 'Debt';
      if (s.includes('insurance')) return 'Insurance';
      if (s.includes('bank') || s.includes('monzo') || s.includes('starling')) return 'Banking';
      return 'Personal Finance';
    }

    // ── Load and render article ──────────────────────────────────────────────
    async function loadArticle() {
      const mdUrl = `/docs/${slug}.md`;

      try {
        const res = await fetch(mdUrl);
        if (!res.ok) {
          document.getElementById('article-content').innerHTML = `
            <h1 style="font-family:var(--serif);margin-bottom:1rem">Article not found</h1>
            <p style="color:var(--ink-muted)">This article doesn't exist or may have moved.</p>
            <a href="/" style="color:var(--accent)">Back to home</a>`;
          document.title = 'Not Found - Luis Paiva';
          return;
        }

        const md   = await res.text();
        let   html = mdToHtml(md);
        const { html: body, disclaimer } = extractDisclaimer(html);
        const category = categoryFromSlug(slug);

        // Extract title for <title> tag
        const titleMatch = md.match(/^# (.+)$/m);
        const title = titleMatch ? titleMatch[1].replace(/<!--.*?-->/g, '').trim() : slug.replace(/-/g,' ');

        // Update page meta
        document.title = `${title} - Luis Paiva`;
        document.querySelector('meta[name="description"]').content =
          md.split('\n').filter(l => l && !l.startsWith('#'))[0]?.substring(0, 155) || title;
        document.getElementById('canonical').href = `https://www.luispaiva.co.uk/${slug}/`;
        // -- Author + Article schema (E-E-A-T) ---------------------------------
        const schema = {
          "@context": "https://schema.org",
          "@type": "Article",
          "headline": title,
          "url": "https://www.luispaiva.co.uk/" + slug + "/",
          "author": {
            "@type": "Person",
            "name": "Luis Paiva",
            "url": "https://www.luispaiva.co.uk/about"
          },
          "publisher": {
            "@type": "Person",
            "name": "Luis Paiva",
            "url": "https://www.luispaiva.co.uk"
          },
          "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "https://www.luispaiva.co.uk/" + slug + "/"
          }
        };
        let schemaTag = document.getElementById('js-schema');
        if (!schemaTag) {
          schemaTag = document.createElement('script');
          schemaTag.type = 'application/ld+json';
          schemaTag.id = 'js-schema';
          document.head.appendChild(schemaTag);
        }
        schemaTag.textContent = JSON.stringify(schema);

        // Render
        document.getElementById('article-content').innerHTML = `
          <div class="article-label">${category}</div>
          ${body}
          ${disclaimer ? `<div class="disclaimer">${disclaimer}</div>` : ''}
          <div class="article-cta">
            <h3>The Friday Money Brief</h3>
            <p>One money tip every Friday. No spam. Unsubscribe any time.</p>
            <form class="article-cta-form" action="https://luispaiva.beehiiv.com/subscribe" method="GET" target="_blank">
              <input type="email" name="email" placeholder="your@email.com" required />
              <button type="submit">Subscribe free</button>
            </form>
          </div>`;

      } catch (err) {
        document.getElementById('article-content').innerHTML = `
          <p style="color:var(--ink-muted)">Error loading article. <a href="/" style="color:var(--accent)">Go home</a></p>`;
      }
    }

    loadArticle();
  </script>
</body>
</html>
